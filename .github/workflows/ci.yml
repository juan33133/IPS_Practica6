name: CI — Build, Test & Coverage

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK ───────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # ── 3. Maven wrapper permissions ─────────────────────────────────────
      - name: Grant execute permission to mvnw
        run: chmod +x ./mvnw

      # ── 4. Compile ──────────────────────────────────────────────────────
      - name: Compile project
        run: ./mvnw compile --no-transfer-progress

      # ── 5. Run all tests (unit + integration) & Jacoco report ───────────
      - name: Run tests (verify phase)
        run: ./mvnw verify --no-transfer-progress

      # ── 6. Publish test report (GitHub Checks tab) ──────────────────────
      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: |
            target/surefire-reports/TEST-*.xml
            target/failsafe-reports/TEST-*.xml
          reporter: java-junit

      # ── 7. Upload test report artifacts ─────────────────────────────────
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 7

      # ── 8. Upload Jacoco coverage report ────────────────────────────────
      - name: Upload Jacoco Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      # ── 9. Generate Jacoco coverage badge ───────────────────────────────
      - name: Generate JaCoCo Badge
        uses: cicirello/jacoco-badge-generator@v2
        if: github.event_name == 'push'
        with:
          jacoco-csv-file: target/site/jacoco/jacoco.csv
          badges-directory: .github/badges
          generate-coverage-badge: true
          coverage-badge-filename: jacoco.svg
          generate-branches-badge: true
          branches-badge-filename: branches.svg

      # ── 10. Commit badge if changed ─────────────────────────────────────
      - name: Commit coverage badge
        if: github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/badges/ || true
          git diff --staged --quiet || git commit -m "ci: update Jacoco coverage badge [skip ci]"
          git push || true
